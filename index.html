<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        
            margin: 0;
            font-family: Arial, sans-serif;
        }

        .calculator {
            width: 300px;
            border-radius: 20px;
            overflow: hidden;
            background-color: #000;
            padding: 10px;
        }

        .display {
            text-align: right;
            padding: 20px;
            font-size: 48px;
            color: #fff;
            background-color: #000;
        }

        .buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
        }

        .btn {
            padding: 20px;
            font-size: 24px;
            border: 1px solid #000;
            background-color: #333;
            color: #fff;
            text-align: center;
            cursor: pointer;
            transition: background-color 0.2s;
            border-radius: 50%;
            margin: 5px;
        }

        .btn.orange {
            background-color: #f90;
            color: #fff;
        }

        .btn.gray {
            background-color: #a5a5a5;
            color: #000;
        }

        .btn.wide {
            grid-column: span 2;
            border-radius: 30px;
        }

        .btn.zero {
            grid-column: span 2;
            border-radius: 50px;
        }

        .btn:active {
            background-color: #999;
        }
    </style>
</head>
<body>
    <div class="calculator">
        <div class="display">
            <span id="display">0</span>
        </div>
        <div class="buttons">
            <button class="btn gray" onclick="clearDisplay()">AC</button>
            <button class="btn gray" onclick="toggleSign()">+/-</button>
            <button class="btn gray" onclick="percent()">%</button>
            <button class="btn orange" onclick="inputOperator('/')">÷</button>

            <button class="btn" onclick="inputNumber(7)">7</button>
            <button class="btn" onclick="inputNumber(8)">8</button>
            <button class="btn" onclick="inputNumber(9)">9</button>
            <button class="btn orange" onclick="inputOperator('*')">×</button>

            <button class="btn" onclick="inputNumber(4)">4</button>
            <button class="btn" onclick="inputNumber(5)">5</button>
            <button class="btn" onclick="inputNumber(6)">6</button>
            <button class="btn orange" onclick="inputOperator('-')">-</button>

            <button class="btn" onclick="inputNumber(1)">1</button>
            <button class="btn" onclick="inputNumber(2)">2</button>
            <button class="btn" onclick="inputNumber(3)">3</button>
            <button class="btn orange" onclick="inputOperator('+')">+</button>

            <button class="btn zero" onclick="inputNumber(0)">0</button>
            <button class="btn" onclick="inputDot()">.</button>
            <button class="btn orange" onclick="calculate()">=</button>
        </div>
    </div>

    <script>
        let currentInput = "0";
        let operator = null;
        let previousInput = null;

        function updateDisplay() {
            document.getElementById('display').innerText = currentInput;
        }

        function clearDisplay() {
            currentInput = "0";
            operator = null;
            previousInput = null;
            updateDisplay();
        }

        function inputNumber(number) {
            if (currentInput === "0") {
                currentInput = number.toString();
            } else {
                currentInput += number.toString();
            }
            updateDisplay();
        }

        function inputDot() {
            if (!currentInput.includes(".")) {
                currentInput += ".";
            }
            updateDisplay();
        }

        function inputOperator(op) {
            if (operator !== null) {
                calculate();
            }
            previousInput = currentInput;
            operator = op;
            currentInput = "0";
        }

        function calculate() {
            let result;
            const prev = parseFloat(previousInput);
            const curr = parseFloat(currentInput);

            if (isNaN(prev) || isNaN(curr)) return;

            switch (operator) {
                case '+':
                    result = prev + curr;
                    break;
                case '-':
                    result = prev - curr;
                    break;
                case '*':
                    result = prev * curr;
                    break;
                case '/':
                    result = prev / curr;
                    break;
                default:
                    return;
            }

            currentInput = result.toString();
            operator = null;
            previousInput = null;
            updateDisplay();
        }

        function toggleSign() {
            currentInput = (-parseFloat(currentInput)).toString();
            updateDisplay();
        }

        function percent() {
            currentInput = (parseFloat(currentInput) / 100).toString();
            updateDisplay();
        }
    </script>
</body>
</html>
